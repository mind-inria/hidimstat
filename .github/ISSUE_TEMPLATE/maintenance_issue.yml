name: Maintenance
description: Report a maintenance issue
title: "[MAINT] <Please write a comprehensive title after the '[MAINT] ' prefix>"
labels: []

body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to report a maintenance-related issue.
  - type: markdown
    attributes:
        value: Before continuing, please check existing issues to avoid duplicates.
  - type: checkboxes
    attributes:
        label: Please confirm that you have searched existing issues in the repository.
        description: You can do this by searching https://github.com/mind-inria/hidimstat/issues and making sure your issue is not related to another existing one.
        options:
            - label: 'Yes'
              required: true
  - type: textarea
    attributes:
      label: "Issue with current workflow:"
  - type: textarea
    attributes:
      label: "Suggested fix:"
      description: >
        Please describe as clearly as possible a suggested fix for the related issue.
  - type: textarea
    attributes:
      label: Additional context (e.g. screenshots, GIFs)
  - type: markdown
    attributes:
      value: Thank you for contributing !
